name: Reusable — Add collaborator

# This is a reusable workflow. Call it from any other repo in the org like this:
#
#   jobs:
#     add-collab:
#       uses: teamantariksh-satellites/PCB-design-training/.github/workflows/reusable-add-collaborator.yml@main
#       with:
#         username: ${{ github.event.pull_request.user.login }}
#         permission: push
#       secrets:
#         collaborator_pat: ${{ secrets.COLLABORATOR_PAT }}

on:
  workflow_call:
    inputs:
      username:
        description: GitHub username to add as collaborator
        required: true
        type: string
      permission:
        description: Permission level — pull, triage, push, maintain, admin
        required: false
        type: string
        default: push
    secrets:
      collaborator_pat:
        description: PAT with repo scope to invite collaborators
        required: true

jobs:
  add-collaborator:
    runs-on: ubuntu-latest
    steps:
      - name: Add collaborator via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.collaborator_pat }}
          script: |
            const username = '${{ inputs.username }}';
            const permission = '${{ inputs.permission }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Adding ${username} to ${owner}/${repo} with permission: ${permission}`);

            try {
              await github.rest.repos.addCollaborator({
                owner,
                repo,
                username,
                permission
              });
              console.log(`Invited ${username} successfully.`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`${username} is already a collaborator.`);
              } else {
                throw error;
              }
            }
