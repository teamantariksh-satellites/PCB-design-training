name: Add PR author as collaborator

# Triggers when a pull request is opened or reopened
on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  invite-collaborator:
    runs-on: ubuntu-latest
    steps:
      - name: Add PR author as repository collaborator
        uses: actions/github-script@v7
        with:
          # This token must be a PAT (Personal Access Token) with repo scope
          # stored as a secret named COLLABORATOR_PAT
          # The default GITHUB_TOKEN does not have permission to invite collaborators
          github-token: ${{ secrets.COLLABORATOR_PAT }}
          script: |
            const username = context.payload.pull_request.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Adding ${username} as collaborator to ${owner}/${repo}`);

            try {
              await github.rest.repos.addCollaborator({
                owner,
                repo,
                username,
                permission: 'push'  // 'pull' = read-only, 'push' = read+write, 'triage' = manage issues
              });
              console.log(`Successfully invited ${username}`);
            } catch (error) {
              // 422 means the user is already a collaborator — that's fine
              if (error.status === 422) {
                console.log(`${username} is already a collaborator, skipping.`);
              } else {
                throw error;
              }
            }

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Hi @${username}! You have been invited as a collaborator on this repository. Check your email or GitHub notifications to accept the invitation if you haven't already.\n\nA mentor will review your submission shortly. Make sure you've gone through the [submission checklist](../blob/main/resources/submission_checklist.md) before requesting a review.`
            });
