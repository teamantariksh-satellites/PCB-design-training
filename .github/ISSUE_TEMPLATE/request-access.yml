name: Request Repository Access
description: Fill this to get added as a collaborator and clone the repo
title: "[Access Request] Your Name"
labels: ["access-request"]
body:
  - type: input
    id: full_name
    attributes:
      label: Full Name
      placeholder: e.g. Riya Sharma
    validations:
      required: true

  - type: input
    id: github_username
    attributes:
      label: GitHub Username
      description: Your exact GitHub username (go to github.com — it's in the URL)
      placeholder: e.g. riya-sharma
    validations:
      required: true

  - type: input
    id: project_idea
    attributes:
      label: Project Idea
      description: Brief description of what you plan to build
      placeholder: e.g. Line follower robot with ATmega328P and IR sensors
    validations:
      required: true

  - type: dropdown
    id: microcontroller
    attributes:
      label: Microcontroller you plan to use
      options:
        - ATmega328P (Arduino Uno)
        - ATtiny85
        - ESP32
        - ESP8266
        - STM32 (Blue Pill)
        - RP2040
        - Other (mention in project idea)
    validations:
      required: true

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: I have installed KiCad 10
          required: true
        - label: I have installed Git
          required: true
        - label: I have read the README
          required: true
